apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: loki
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "2"
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: infrastructure
    source:
        chart: loki
        repoURL: https://grafana.github.io/helm-charts
        targetRevision: 7.0.0
        helm:
            values: |
                chunksCache:
                  enabled: false
                resultsCache:
                  enabled: false
                gateway:
                  readinessProbe:
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                write:
                  replicas: 1
                read:
                  replicas: 1
                backend:
                  replicas: 1
                loki:
                  commonConfig:
                    replication_factor: 1
                  auth_enabled: false
                  limits_config:
                    ingestion_rate_mb: 100
                    ingestion_burst_size_mb: 200
                  schemaConfig:
                    configs:
                      - from: "2026-01-01"
                        store: tsdb
                        object_store: filesystem
                        schema: v13
                        index:
                          prefix: index_
                          period: 24h
                test:
                  enabled: false
                storage:
                  type: filesystem
                minio:
                  enabled: true
                monitoring:
                  selfMonitoring:
                    enabled: false
                    grafanaAgent:
                      installOperator: false
    destination:
        server: https://kubernetes.default.svc
        namespace: observability
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        managedNamespaceMetadata:
            labels:
                istio.io/dataplane-mode: ambient
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
