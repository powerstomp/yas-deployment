apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: akhq
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "2"
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: infrastructure
    sources:
        - ref: values
          repoURL: https://github.com/powerstomp/yas-deployment.git
          targetRevision: HEAD
        - chart: akhq
          repoURL: https://akhq.io/
          targetRevision: 0.27.0
          helm:
              valueFiles:
                  - $values/deploy/kafka/akhq.values.yaml
    destination:
        server: https://kubernetes.default.svc
        namespace: kafka
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
