apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/powerstomp/yas-deployment.git
    targetRevision: HEAD
    path: deploy/keycloak/keycloak
    helm:
      values: |
        hostname: identity.yas.local.com
        postgresql:
          username: yasadminuser
          password: admin
        bootstrapAdmin:
          username: admin
          password: admin
        backofficeRedirectUrl: http://backoffice.yas.local.com
        storefrontRedirectUrl: http://storefront.yas.local.com
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
