apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-hosts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/powerstomp/yas-deployment.git
    targetRevision: HEAD
    path: gitops/children/infrastructure/coredns-hosts
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
