apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
    name: dev-yas-services
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "3"
spec:
    generators:
        - git:
              repoURL: https://github.com/powerstomp/yas-deployment.git
              revision: HEAD
              files:
                  - path: gitops/children/environments/dev/services.yaml
    template:
        metadata:
            name: "dev-{{ name }}"
            namespace: argocd
        spec:
            project: dev
            source:
                repoURL: https://github.com/powerstomp/yas-deployment.git
                targetRevision: HEAD
                path: "charts/{{ name }}"
                helm:
                    values: |
                        backend:
                          image:
                            repository: {{ repo }}
                            tag: {{ tag }}
                          ingress:
                            host: {{ host }}.dev.yas.local.com
                        ui:
                          image:
                            repository: {{ repo }}
                            tag: {{ tag }}
                        image:
                          repository: {{ repo }}
                          tag: {{ tag }}
                        ingress:
                          host: {{ host }}.dev.yas.local.com
            destination:
                server: https://kubernetes.default.svc
                namespace: yas-dev
            syncPolicy:
                automated:
                    prune: true
                    selfHeal: true
                managedNamespaceMetadata:
                    labels:
                        istio.io/dataplane-mode: ambient
                syncOptions:
                    - CreateNamespace=true
                    - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: dev-yas-configuration
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "3"
spec:
    project: dev
    source:
        repoURL: https://github.com/powerstomp/yas-deployment.git
        targetRevision: HEAD
        path: charts/yas-configuration
    destination:
        server: https://kubernetes.default.svc
        namespace: yas-dev
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        managedNamespaceMetadata:
            labels:
                istio.io/dataplane-mode: ambient
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
