apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: argocd-image-updater
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "-2"
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: infrastructure
    source:
        repoURL: https://github.com/powerstomp/yas-deployment.git
        targetRevision: HEAD
        path: deploy/image-updater
    destination:
        server: https://kubernetes.default.svc
        namespace: argocd
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
