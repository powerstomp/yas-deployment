apiVersion: v1
kind: ServiceAccount
metadata:
  name: coredns-hosts-patcher
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coredns-hosts-patcher
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["traefik"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["coredns"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["coredns"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coredns-hosts-patcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: coredns-hosts-patcher
subjects:
  - kind: ServiceAccount
    name: coredns-hosts-patcher
    namespace: kube-system
