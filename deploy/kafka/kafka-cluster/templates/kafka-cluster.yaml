apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
    name: kafka-cluster
spec:
    kafka:
        version: 3.4.0
        replicas: {{ .Values.kafka.replicas }}
        listeners:
            - name: plain
              port: 9092
              type: internal
              tls: false
            - name: tls
              port: 9093
              type: internal
              tls: true
              authentication:
                  type: tls
            - name: external
              port: 9094
              type: nodeport
              tls: false
        livenessProbe:
            initialDelaySeconds: 45
        readinessProbe:
            initialDelaySeconds: 45
        storage:
            type: jbod
            volumes:
                - id: 0
                  type: persistent-claim
                  size: 100Gi
                  deleteClaim: false
        config:
            offsets.topic.replication.factor: 1
            transaction.state.log.replication.factor: 1
            transaction.state.log.min.isr: 1
            default.replication.factor: 1
            min.insync.replicas: 1
            log.message.format.version: "3.4"
            inter.broker.protocol.version: "3.4"
    zookeeper:
        replicas: {{ .Values.zookeeper.replicas }}
        livenessProbe:
            initialDelaySeconds: 45
        readinessProbe:
            initialDelaySeconds: 45
        storage:
            type: persistent-claim
            size: {{ .Values.zookeeper.storeSize }}
            deleteClaim: false
    entityOperator:
        topicOperator: {}
        userOperator: {}
